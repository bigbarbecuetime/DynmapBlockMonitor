name: dynmap-tracker

services:
  tracker:
    # Pulls the prebuilt image from GitHub Container Registry, no source or build needed.
    image: ghcr.io/bigbarbecuetime/dynmap-tracker:latest
    # Developers building from source: uncomment the next line and run `docker compose up --build`.
    build: .
    container_name: dynmap-tracker
    restart: unless-stopped
    env_file: .env          # copy .env.example to .env and fill it in
    volumes:
      - ./data:/data        # logs land in ./data on the host
