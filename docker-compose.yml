services:
  blockmonitor:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DYNMAP_URL=${DYNMAP_URL:-http://your-server:8123}
      - WORLD_NAME=${WORLD_NAME:-world}
      - MAP_TYPE=${MAP_TYPE:-flat2}
      - POLL_INTERVAL=10000
      - DB_PATH=/app/data/monitor.db
      - ALERTS_DIR=/app/data/alerts
      - OFFLINE_THRESHOLD=300000
      - RESCAN_COOLDOWN=60000
      - MAX_CONCURRENT_FETCHES=3
